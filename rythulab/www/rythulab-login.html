<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RythuLab Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a3a1a 0%, #2d5a27 40%, #4a7c3f 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: rgba(255,255,255,0.97); border-radius: 20px;
            padding: 48px 40px; width: 100%; max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
        }
        .logo-area { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 48px; margin-bottom: 10px; }
        .logo-area h1 { font-size: 28px; font-weight: 700; color: #1a3a1a; letter-spacing: -0.5px; }
        .logo-area p  { color: #6b7c6b; font-size: 13px; margin-top: 4px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #2d4a2d; margin-bottom: 6px; }
        input {
            width: 100%; padding: 12px 16px; border: 2px solid #e0e8e0;
            border-radius: 10px; font-size: 15px; color: #1a3a1a;
            outline: none; transition: border-color 0.2s; background: #f8faf8;
        }
        input:focus { border-color: #4a7c3f; background: #fff; }
        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #2d5a27, #4a7c3f);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            margin-top: 8px; transition: opacity 0.2s, transform 0.1s;
        }
        .btn-login:hover    { opacity: 0.92; transform: translateY(-1px); }
        .btn-login:active   { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .register-link { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7c6b; }
        .register-link a { color: #2d5a27; font-weight: 600; text-decoration: none; }
        .register-link a:hover { text-decoration: underline; }
        .error-msg {
            background: #fff0f0; border: 1px solid #ffcccc; color: #c0392b;
            border-radius: 8px; padding: 10px 14px; font-size: 13px;
            margin-bottom: 16px; display: none;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo-area">
        <div class="logo-icon">🌾</div>
        <h1>RythuLab</h1>
        <p>Agricultural Crop Model Platform</p>
    </div>

    <div class="error-msg" id="error_msg"></div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login_email" placeholder="Enter your email"
               onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="login_password" placeholder="Enter your password"
               onkeydown="if(event.key==='Enter') doLogin()" />
    </div>

    <button class="btn-login" id="login_btn" onclick="doLogin()">Login</button>

    <div class="register-link">
        New Farmer Scientist? <a href="/farmer-register">Create an account</a>
    </div>
</div>

<script>
function showError(msg) {
    var el = document.getElementById("error_msg");
    el.textContent   = msg;
    el.style.display = "block";
}

function doLogin() {
    var email    = document.getElementById("login_email").value.trim();
    var password = document.getElementById("login_password").value;
    var btn      = document.getElementById("login_btn");

    document.getElementById("error_msg").style.display = "none";

    if (!email || !password) {
        showError("Please enter both email and password.");
        return;
    }

    btn.disabled    = true;
    btn.textContent = "Logging in...";

    // Step 1 — Login using Frappe's login endpoint
    var params = new URLSearchParams();
    params.append("usr", email);
    params.append("pwd", password);

    fetch("/api/method/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString()
    })
    .then(function(r) { return r.json(); })
    .then(function(res) {

        if (res.message === "Logged In") {

            // Step 2 — Ask backend which role this user has
            fetch("/api/method/rythulab.api.login_redirect", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" }
            })
            .then(function(r2) { return r2.json(); })
            .then(function(res2) {
                if (res2.message === "farmer") {
                    window.location.href = "/farmer-dashboard";
                } else {
                    window.location.href = "/desk";
                }
            })
            .catch(function() {
                // fallback — just go to desk
                window.location.href = "/desk";
            });

        } else {
            showError("Invalid email or password. Please try again.");
            btn.disabled    = false;
            btn.textContent = "Login";
        }
    })
    .catch(function() {
        showError("Server error. Please try again.");
        btn.disabled    = false;
        btn.textContent = "Login";
    });
}
</script>
</body>
</html>
